<div class="container p-4">

  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  
  <div class="card p-4 shadow-2 border-round-xl">

    <div class="flex justify-content-between align-items-center mb-4">
      <h2 class="m-0">Cadastro de Produto</h2>

      <p-button 
        [routerLink]="['/pedido']"
        label="Ir para Pedidos" 
        icon="pi pi-arrow-right"
        severity="secondary">
      </p-button>
    </div>

    <form [formGroup]="form" (ngSubmit)="salvar()" class="flex flex-column gap-4">
      
      <div class="flex flex-column gap-2">
        <label for="nome" class="font-bold">Nome do produto</label>
        <input 
          pInputText 
          id="nome" 
          formControlName="nome" 
          placeholder="Escreva o nome do produto" />
      </div>

      <div class="flex flex-column gap-2">
        <label for="preco" class="font-bold">Preço</label>
        <p-inputNumber
          placeholder="Digite o preço do produto" 
          id="preco" 
          formControlName="preco" 
          mode="currency" 
          currency="BRL" 
          locale="pt-BR"
          [style]="{'width': '100%'}">
        </p-inputNumber>
      </div>

      <p-button 
        type="submit" 
        [label]="produtoEditandoId ? 'Atualizar Produto' : 'Cadastrar Produto'" 
        [icon]="produtoEditandoId ? 'pi pi-refresh' : 'pi pi-plus'"
        class="w-full"
        severity="success">
      </p-button>

    </form>
  </div>


  <div class="card p-4 shadow-2 border-round-xl">
    <h2 class="mb-4">Lista de Produtos</h2>

    <p-table 
      [value]="produtos" 
      [paginator]="true" 
      [rows]="5" 
      responsiveLayout="stack" 
      *ngIf="produtos.length > 0">

      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Preço</th>
          <th class="text-center">Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-produto>
        <tr>
          <td>{{ produto.nome }}</td>
          <td class="font-semibold">
            {{ produto.preco | currency:'BRL' }}
          </td>
          <td class="flex justify-content-center gap-2">

            <p-button 
              icon="pi pi-pencil" 
              [rounded]="true"
              (click)="editar(produto)" 
              pTooltip="Editar">
            </p-button>

            <p-button 
              icon="pi pi-trash" 
              [rounded]="true"
              severity="danger"
              (click)="deletar(produto.id)" 
              pTooltip="Excluir">
            </p-button>

          </td>
        </tr>
      </ng-template>

    </p-table>

    <div *ngIf="produtos.length === 0" class="text-center p-5 surface-ground border-round">
      <i class="pi pi-box text-4xl mb-3 text-400"></i>
      <p class="text-secondary">Nenhum produto cadastrado até o momento.</p>
    </div>

  </div>

</div>
