<div class="container">

  <div class="card1">
    <h2>Cadastro de Produto</h2>

    <form [formGroup]="form" (ngSubmit)="salvar()">
      <input type="text" formControlName="nome" placeholder="Nome do produto" />
      <input type="number" formControlName="preco" placeholder="Preço" />

      <button type="submit">Salvar</button>
    </form>
  </div>

  <div class="card">
    <h2>Lista de Produtos</h2>

    <table *ngIf="produtos.length > 0">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Preço</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let produto of produtos">
          <td>{{ produto.nome }}</td>
          <td>R$ {{ produto.preco }}</td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="produtos.length === 0">Nenhum produto cadastrado.</p>
  </div>

</div>
